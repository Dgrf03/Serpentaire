<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contacto - SERPENTAIRE</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body style="background: var(--color-bg);">
  <header class="header" style="text-align: center; padding: 2rem;"><h1><a href="index.html" style="color: var(--color-primary); font-size: 3rem;">SERPENTAIRE</a></h1></header>
  <main style="max-width: 600px; margin: 4rem auto; padding: 0 2rem; color: var(--color-primary);">
    <h2 style="font-size: 3rem; margin-bottom: 2rem; text-align: center;">Contacto</h2>
    <form style="display: flex; flex-direction: column; gap: 1rem; font-family: var(--font-body);">
      <input type="text" placeholder="Nombre" required style="padding: 1rem; border: 1px solid var(--color-border);">
      <input type="email" placeholder="Email" required style="padding: 1rem; border: 1px solid var(--color-border);">
      <textarea placeholder="Mensaje" rows="5" required style="padding: 1rem; border: 1px solid var(--color-border);"></textarea>
      <button type="submit" class="drawer-checkout-btn" style="width: 100%;">Enviar mensaje</button>
    </form>
  </main>
</body>
</html>
